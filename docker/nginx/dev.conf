map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8081;
    server_name _;

    # Increase body size limit for file uploads (images, etc.)
    client_max_body_size 20M;

    location /api/ {
        proxy_pass http://personal-portal-be:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeout for large file uploads
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        proxy_read_timeout 300;
        send_timeout 300;
    }

    # Spring Boot Admin UI (HTTP + WebSocket); path must match server context-path
    # Logfile view uses Range/206 + Content-Range; gzip/buffering can drop Content-Range and break SBA UI (.split on undefined)
    location /admin/sba {
        proxy_pass http://personal-portal-be:8080/admin/sba;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Accept-Encoding "";
        gzip off;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Proxy all other requests to the frontend service
    location / {
        proxy_pass http://personal-portal-fe:4173/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
