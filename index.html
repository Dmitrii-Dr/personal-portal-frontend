<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />

  <!-- Favicon – best-practice multi-format set -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png?v=3" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png?v=3" />
  <link rel="apple-touch-icon" href="/favicon/android-chrome-512x512.png?v=3" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#2C5F5F" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Professional's Portal</title>
  <style>
    html {
      scroll-behavior: smooth;
    }

    /* Account for sticky header when scrolling to sections */
    section[id] {
      scroll-margin-top: 64px;
    }

    /*
      Pre-React shell loader: shown until the JS bundle runs and React mounts.
      Vector ψ: /loader-psi.svg — keep in sync with LandingPageLoader.jsx.
    */
    #initial-app-loader {
      min-height: 100vh;
      width: 100%;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f0f7f7;
      box-sizing: border-box;
    }

    #initial-app-loader .initial-app-loader__inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    #initial-app-loader .initial-app-loader__perspective {
      width: 96px;
      height: 96px;
      perspective: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #initial-app-loader .initial-app-loader__coin {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background-color: #2c5f5f;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.12);
      transform-style: preserve-3d;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      opacity: 0;
      transition: opacity 0.2s ease-out;
      animation: none;
    }

    #initial-app-loader .initial-app-loader__coin.initial-app-loader__coin--ready {
      opacity: 1;
      animation: initial-app-loader-coin-y 1.35s linear infinite;
    }

    #initial-app-loader .initial-app-loader__psi {
      width: 56px;
      height: 56px;
      display: block;
    }

    @keyframes initial-app-loader-coin-y {
      from {
        transform: rotateY(0deg);
      }

      to {
        transform: rotateY(360deg);
      }
    }

    #initial-app-loader .initial-app-loader__label {
      margin: 0;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: rgba(0, 0, 0, 0.6);
    }
  </style>
</head>

<body>
  <div id="root">
    <div id="initial-app-loader" role="status" aria-busy="true" aria-live="polite">
      <div class="initial-app-loader__inner">
        <div class="initial-app-loader__perspective" aria-hidden="true">
          <div class="initial-app-loader__coin">
            <img class="initial-app-loader__psi" src="/loader-psi.svg" width="56" height="56" alt="" />
          </div>
        </div>
        <p id="initial-app-loader-label" class="initial-app-loader__label">Loading…</p>
      </div>
    </div>
  </div>
  <script>
    (function () {
      /* Only source for loader copy — React reads window.__portalLoadingLabel (see LandingPageLoader.jsx). */
      var LOADING = { en: 'Loading…', ru: 'Загрузка…' };
      function getShellLang() {
        try {
          var q = new URLSearchParams(window.location.search).get('lang');
          if (q === 'en' || q === 'ru') return q;
        } catch (e) {}
        try {
          var s = localStorage.getItem('i18nextLng');
          if (s === 'en' || s === 'ru') return s;
        } catch (e) {}
        return 'ru';
      }
      var lang = getShellLang();
      document.documentElement.lang = lang;
      var resolvedLoading = LOADING[lang] || LOADING.ru;
      window.__portalLoadingLabel = resolvedLoading;
      var label = document.getElementById('initial-app-loader-label');
      if (label) label.textContent = resolvedLoading;

      var coin = document.querySelector('.initial-app-loader__coin');
      var img = document.querySelector('.initial-app-loader__psi');
      if (!coin || !img) return;
      function showCoin() {
        coin.classList.add('initial-app-loader__coin--ready');
      }
      if (img.complete && img.naturalWidth > 0) showCoin();
      else {
        img.addEventListener('load', showCoin);
        img.addEventListener('error', showCoin);
      }
    })();
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
