<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <script>
    (function () {
      /* Warm visit in this tab: skip #initial-app-loader on first paint (key set in main.jsx). */
      try {
        if (sessionStorage.getItem('__portalShellBooted') === '1') {
          document.documentElement.classList.add('portal-shell-skip');
        }
      } catch (e) {}
    })();
  </script>

  <link rel="preload" href="/loader-psi.svg" as="image" type="image/svg+xml" />

  <!-- Favicon – best-practice multi-format set -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png?v=3" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png?v=3" />
  <link rel="apple-touch-icon" href="/favicon/android-chrome-512x512.png?v=3" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#2C5F5F" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Professional's Portal</title>
  <style>
    html {
      scroll-behavior: smooth;
    }

    /* Account for sticky header when scrolling to sections */
    section[id] {
      scroll-margin-top: 64px;
    }

    /*
      Pre-React shell loader: sibling of #root. Dismissed in main.jsx (opacity 0, then remove next frame).
      Mark: single img public/loader-psi.svg (teal circle + ψ) — same file as LandingPageLoader.jsx.
    */
    html.portal-shell-skip #initial-app-loader {
      display: none !important;
    }

    #initial-app-loader {
      position: fixed;
      inset: 0;
      z-index: 10000;
      min-height: 100vh;
      width: 100%;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f0f7f7;
      box-sizing: border-box;
    }

    #initial-app-loader .initial-app-loader__inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    #initial-app-loader .initial-app-loader__perspective {
      width: 96px;
      height: 96px;
      perspective: 320px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #initial-app-loader .initial-app-loader__coin {
      width: 96px;
      height: 96px;
      transform-style: preserve-3d;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      will-change: transform;
      animation: initial-app-loader-coin-y 1.35s linear infinite;
      animation-fill-mode: both;
      /* animation-delay set inline to match LandingPageLoader (phase sync with performance.now() % 1350) */
    }

    #initial-app-loader .initial-app-loader__mark {
      width: 96px;
      height: 96px;
      display: block;
      border-radius: 50%;
      filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.12));
    }

    @keyframes initial-app-loader-coin-y {
      from {
        transform: rotateY(0deg) translateZ(0.1px);
      }

      to {
        transform: rotateY(360deg) translateZ(0.1px);
      }
    }

    #initial-app-loader .initial-app-loader__label {
      margin: 0;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      line-height: 1.43;
      color: rgba(0, 0, 0, 0.6);
    }
  </style>
</head>

<body>
  <div id="initial-app-loader" role="status" aria-busy="true" aria-live="polite">
    <div class="initial-app-loader__inner">
      <div class="initial-app-loader__perspective" aria-hidden="true">
        <div class="initial-app-loader__coin">
          <img class="initial-app-loader__mark" src="/loader-psi.svg" width="96" height="96" alt="" />
        </div>
      </div>
      <p id="initial-app-loader-label" class="initial-app-loader__label">Loading…</p>
    </div>
  </div>
  <div id="root"></div>
  <script>
    (function () {
      /* Only source for loader copy — React reads window.__portalLoadingLabel (see LandingPageLoader.jsx). */
      var LOADING = { en: 'Loading…', ru: 'Загрузка…' };
      function getShellLang() {
        try {
          var q = new URLSearchParams(window.location.search).get('lang');
          if (q === 'en' || q === 'ru') return q;
        } catch (e) {}
        try {
          var s = localStorage.getItem('i18nextLng');
          if (s === 'en' || s === 'ru') return s;
        } catch (e) {}
        return 'ru';
      }
      var lang = getShellLang();
      document.documentElement.lang = lang;
      var resolvedLoading = LOADING[lang] || LOADING.ru;
      window.__portalLoadingLabel = resolvedLoading;
      var label = document.getElementById('initial-app-loader-label');
      if (label) label.textContent = resolvedLoading;

      /* Same phase rule as LandingPageLoader.jsx — avoids static frame + spin reset at React handoff */
      var COIN_FLIP_MS = 1350;
      var coin = document.querySelector('.initial-app-loader__coin');
      if (coin) {
        coin.style.animationDelay = '-' + (performance.now() % COIN_FLIP_MS) + 'ms';
      }
    })();
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
